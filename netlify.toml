# Netlify deploy configuration for the Kitchen Timer PWA.
# Static site, no bundler: `npm run build` validates + assembles ./dist.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # No third-party deps are needed to build the site itself.
  NPM_FLAGS = "--no-audit --no-fund"

# ---- Security headers (mirrors the meta CSP; adds frame-ancestors etc.) ----
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; manifest-src 'self'; base-uri 'none'; object-src 'none'; form-action 'none'; frame-ancestors 'none'"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), interest-cohort=()"
    X-Frame-Options = "DENY"

# The service worker must always be revalidated so updates ship promptly.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# Hashless static assets: cache for a day, revalidate after.
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

# ---- SPA / share-link fallback ----
# Real files are served first; this only catches unknown paths so deep links
# and share URLs (which live on "/") always load the app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
